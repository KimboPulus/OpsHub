spring.application.name=OpsHub
server.port=${PORT:8080}
spring.profiles.default=local

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=32MB

opshub.security.password=${OPSHUB_SECURITY_PASSWORD:opshub}
opshub.security.allowed-origins=${OPSHUB_SECURITY_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=true
info.app.name=OpsHub
info.app.description=Factory operations workflow demo
