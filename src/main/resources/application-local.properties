spring.datasource.url=${OPSHUB_DATASOURCE_URL:jdbc:h2:file:./data/fortaco-opshub;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${OPSHUB_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${OPSHUB_DATASOURCE_USERNAME:sa}
spring.datasource.password=${OPSHUB_DATASOURCE_PASSWORD:}

spring.h2.console.enabled=${OPSHUB_H2_CONSOLE_ENABLED:true}
